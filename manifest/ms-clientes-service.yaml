# kubectl apply -f ms-clientes-service.yml
apiVersion: v1
kind: Service
metadata:
  name: ms-clientes-service
  namespace: ms-clientes-namespace
spec:
  type: LoadBalancer
  ports:
  - name: port-8080
    port: 8080
    targetPort: 8080
  - name: port-9080
    port: 9080
    targetPort: 9080
  selector:
    app: ms-clientes
